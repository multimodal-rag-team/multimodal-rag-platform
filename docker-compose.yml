services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: multimodal-rag-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: multimodal_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./MULTIMODAL_RAG/indexer/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./MULTIMODAL_RAG
      dockerfile: Dockerfile
    container_name: multimodal-rag-backend
    restart: unless-stopped
    env_file:
      - ./MULTIMODAL_RAG/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/multimodal_rag
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: "false"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/data/uploads
      - backend_images:/app/data/images
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./multimodal-rag-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: multimodal-rag-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_uploads:
  backend_images: